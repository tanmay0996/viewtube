name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/viewtube
            git pull origin main
            
            # Replace IP in env files
            sed "s/\${DROPLET_IP}/${{ secrets.DROPLET_IP }}/g" frontend/.env.docker.template > frontend/.env.docker
            sed "s/\${DROPLET_IP}/${{ secrets.DROPLET_IP }}/g" backend/.env.docker.template > backend/.env.docker
            
            # Deploy
            docker-compose down
            docker-compose up -d --build
            docker system prune -af